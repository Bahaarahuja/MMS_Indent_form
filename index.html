<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MMS Indent Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --panel-2: #fbfbfc;
      --line: #e5e7eb;
      --line-2: #d1d5db;
      --text: #111827;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --shadow: 0 12px 40px rgba(17, 24, 39, 0.06);
      --radius: 18px;

      --excel-header: #d8ffff;
      --excel-group: #00008b;
      --excel-group-text: #ffffff;
      --excel-sosrc: #f8d7da;
      --excel-dl: #bfc3c9;
      --excel-body: #d8ffff;
      --excel-border: #111111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: min(1440px, calc(100% - 32px));
      margin: 24px auto 28px;
    }

    .top-card,
    .preview-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .top-card { padding: 18px; }

    .subcard {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 18px;
    }

    .upload-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .upload-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 14px;
    }

    .upload-box label,
    .toolbar-filter label {
      display: block;
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    input[type="file"],
    input[type="search"],
    select {
      width: 100%;
      padding: 10px 12px;
      font: inherit;
      color: var(--text);
      background: white;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 14px;
    }

    .stat .k {
      display: block;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    .stat .l {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .03em;
      font-weight: 600;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 1px solid transparent;
      background: white;
      color: var(--text);
      font: inherit;
      font-weight: 600;
      font-size: 14px;
      padding: 11px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: .15s ease;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .btn-secondary {
      border-color: var(--line-2);
      background: white;
    }

    .preview-card {
      margin-top: 18px;
      overflow: hidden;
    }

    .preview-toolbar {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: white;
      display: grid;
      gap: 14px;
    }

    .preview-toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .preview-toolbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .toolbar-filters {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .toolbar-filter {
      min-width: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: white;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #10b981;
    }

    .table-wrap {
      height: 74vh;
      min-height: 520px;
      overflow: auto;
      background: white;
    }

    table {
      width: 100%;
      min-width: 1120px;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    col.code-col { width: 115px; }
    col.mms-col { width: 67px; }
    col.title-col { width: 327px; }
    col.qty-col { width: 67px; }
    col.sale-col { width: 75px; }
    col.cost-col { width: 72px; }
    col.saleamt-col { width: 83px; }
    col.costamt-col { width: 95px; }
    col.remarks-col { width: 140px; }

    thead th {
      position: sticky;
      z-index: 5;
      background: var(--excel-header);
      color: #111827;
      border-right: 1px solid var(--excel-border);
      border-bottom: 1px solid var(--excel-border);
      border-top: 1px solid var(--excel-border);
      padding: 13px 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    thead tr:first-child th {
      top: 0;
      font-size: 16px;
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      height: 54px;
    }

    thead tr:nth-child(2) th {
      top: 54px;
      font-size: 18px;
      line-height: 1.1;
      height: 74px;
    }

    thead th:first-child,
    tbody td:first-child {
      border-left: 1px solid var(--excel-border);
    }

    tbody td {
      padding: 11px 10px;
      border-right: 1px solid var(--excel-border);
      border-bottom: 1px solid var(--excel-border);
      font-size: 14px;
      vertical-align: top;
      background: var(--excel-body);
    }

    tbody tr:hover td {
      filter: brightness(0.99);
    }

    .group-row td {
      position: sticky;
      top: 128px;
      z-index: 4;
      background: var(--excel-group);
      color: var(--excel-group-text);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .03em;
      border-top: 1px solid var(--excel-border);
      border-bottom: 1px solid var(--excel-border);
      height: 34px;
      padding: 4px 10px;
    }

    .data-row td {
      background: var(--excel-body);
    }

    .data-row.sosrc-row td {
      background: var(--excel-sosrc);
    }

    .data-row.dl-row td {
      background: var(--excel-dl);
    }

    .data-row td.qty-cell {
      background: #ffffff !important;
    }

    .qty-cell input {
      width: 54px;
      padding: 7px 8px;
      border: 1px solid #9ca3af;
      border-radius: 4px;
      font: inherit;
      background: #ffffff;
    }

    .title-cell,
    .code-cell,
    .mms-cell {
      font-weight: 600;
    }

    .remarks-text {
      font-size: 12px;
      font-weight: 700;
      line-height: 1.35;
      white-space: pre-line;
    }

    .empty {
      display: grid;
      place-items: center;
      height: 100%;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .empty h3 {
      margin: 14px 0 6px;
      color: var(--text);
      font-size: 22px;
    }

    .empty p {
      margin: 0;
      max-width: 580px;
      line-height: 1.7;
    }

    .log {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: white;
      padding: 12px 14px;
      max-height: 180px;
      overflow: auto;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    @media (max-width: 1180px) {
      .toolbar-filters {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 1100px) {
      .upload-grid { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .table-wrap { height: 68vh; }
    }

    @media (max-width: 700px) {
      .upload-grid,
      .toolbar-filters {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell { width: min(100% - 16px, 1440px); margin: 16px auto 20px; }
      .top-card { padding: 18px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .toolbar-right { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="top-card">
      <div class="subcard">
        <div class="upload-grid">
          <div class="upload-box">
            <label for="masterFile">Books Master</label>
            <input id="masterFile" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
          </div>
          <div class="upload-box">
            <label for="stockFile">Stock Position</label>
            <input id="stockFile" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
          </div>
          <div class="upload-box">
            <label for="sosrcFile">SOSRC File</label>
            <input id="sosrcFile" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
          </div>
          <div class="upload-box">
            <label for="previousIndentFile">Previous Indent</label>
            <input id="previousIndentFile" type="file" accept=".xlsx,.xls,.csv,text/csv,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" />
          </div>
        </div>

        <div class="actions">
          <button id="buildBtn" class="btn-primary">Build preview</button>
          <button id="resetBtn" class="btn-secondary">Reset</button>
        </div>

        <div class="stats" style="margin-top:16px;">
          <div class="stat"><span id="booksCount" class="k">0</span><span class="l">Shown books</span></div>
          <div class="stat"><span id="matchCount" class="k">0</span><span class="l">Shown matched stock</span></div>
          <div class="stat"><span id="sosrcCount" class="k">0</span><span class="l">Shown SOSRC items</span></div>
          <div class="stat"><span id="langCount" class="k">0</span><span class="l">Shown languages</span></div>
          <div class="stat"><span id="exceptionCount" class="k">0</span><span class="l">Exception items</span></div>
        </div>

        <div id="log" class="log">Ready.</div>
      </div>
    </section>

    <section class="preview-card">
      <div class="preview-toolbar">
        <div class="preview-toolbar-top">
          <div>
            <h2>Preview</h2>
          </div>
          <div class="toolbar-right">
            <div class="status"><span class="dot"></span><span id="statusText">Waiting for files</span></div>
            <button id="downloadBtn" class="btn-primary" disabled>Download Excel</button>
          </div>
        </div>

        <div class="toolbar-filters">
          <div class="toolbar-filter">
            <label for="searchInput">Search</label>
            <input id="searchInput" type="search" placeholder="Search by title, MMS code, BAV code, or remarks" />
          </div>

          <div class="toolbar-filter">
            <label for="languageFilter">Language</label>
            <select id="languageFilter">
              <option value="ALL">All languages</option>
            </select>
          </div>

          <div class="toolbar-filter">
            <label for="remarksFilter">Remarks</label>
            <select id="remarksFilter">
              <option value="ALL">All remarks</option>
              <option value="SOSRC">SOSRC</option>
              <option value="All India low stock">All India low stock</option>
              <option value="DL low stock">DL low stock</option>
              <option value="NO_REMARKS">No remarks</option>
            </select>
          </div>

          <div class="toolbar-filter">
            <label for="sortFilter">Sort</label>
            <select id="sortFilter">
              <option value="LANG_TITLE_ASC">Language + Title A-Z</option>
              <option value="TITLE_ASC">Title A-Z</option>
              <option value="TITLE_DESC">Title Z-A</option>
              <option value="MMS_ASC">MMS Code Low-High</option>
              <option value="MMS_DESC">MMS Code High-Low</option>
              <option value="CODE_ASC">Code A-Z</option>
              <option value="CODE_DESC">Code Z-A</option>
              <option value="SALE_ASC">Sale Price Low-High</option>
              <option value="SALE_DESC">Sale Price High-Low</option>
              <option value="COST_ASC">Cost Price Low-High</option>
              <option value="COST_DESC">Cost Price High-Low</option>
            </select>
          </div>

          <div class="toolbar-filter">
            <label>&nbsp;</label>
            <button id="clearFiltersBtn" class="btn-secondary" style="width:100%;">Clear</button>
          </div>
        </div>
      </div>

      <div id="tableWrap" class="table-wrap">
        <div class="empty" id="emptyState">
          <div>
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 16V8M8.5 11.5 12 8l3.5 3.5" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 15.5A3.5 3.5 0 0 0 17 9a5.5 5.5 0 0 0-10.58 1.89A4 4 0 0 0 7 19h11a3 3 0 0 0 2-5.5Z" stroke="#94a3b8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h3>No preview yet</h3>
            <p>Upload the files and build the preview.</p>
          </div>
        </div>
        <table id="previewTable" style="display:none"></table>
      </div>
    </section>
  </div>

  <script>
    const validLangs = [
      'ENGLISH', 'HINDI', 'PUNJABI', 'ASSAMESE', 'BENGALI', 'GUJARATI',
      'KANNADA', 'KONKANI', 'MALAYALAM', 'MARATHI', 'NEPALI', 'ODIA',
      'SINDHI', 'SWAHILI', 'TAMIL', 'TELUGU', 'URDU'
    ];

    const langOrder = ['ENGLISH', 'HINDI', 'PUNJABI'].concat(
      validLangs.filter(l => !['ENGLISH', 'HINDI', 'PUNJABI'].includes(l)).sort()
    );

    const state = {
      rows: [],
      filteredRows: [],
      groupedRows: [],
      workbookBlob: null,
      matchedStock: 0,
      sosrcCount: 0,
      languagesShown: 0,
      exceptionRows: []
    };

    const els = {
      masterFile: document.getElementById('masterFile'),
      stockFile: document.getElementById('stockFile'),
      sosrcFile: document.getElementById('sosrcFile'),
      previousIndentFile: document.getElementById('previousIndentFile'),
      buildBtn: document.getElementById('buildBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      resetBtn: document.getElementById('resetBtn'),
      clearFiltersBtn: document.getElementById('clearFiltersBtn'),
      searchInput: document.getElementById('searchInput'),
      languageFilter: document.getElementById('languageFilter'),
      remarksFilter: document.getElementById('remarksFilter'),
      sortFilter: document.getElementById('sortFilter'),
      log: document.getElementById('log'),
      statusText: document.getElementById('statusText'),
      previewTable: document.getElementById('previewTable'),
      emptyState: document.getElementById('emptyState'),
      booksCount: document.getElementById('booksCount'),
      matchCount: document.getElementById('matchCount'),
      sosrcCount: document.getElementById('sosrcCount'),
      langCount: document.getElementById('langCount'),
      exceptionCount: document.getElementById('exceptionCount')
    };

    function log(message, type = 'info') {
      const stamp = new Date().toLocaleTimeString();
      const prefix = type === 'error' ? '[error]' : '[info]';
      els.log.innerHTML += `\n${stamp} ${prefix} ${escapeHtml(message)}`;
      els.log.scrollTop = els.log.scrollHeight;
    }

    function setStatus(text) {
      els.statusText.textContent = text;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeKey(value) {
      return String(value ?? '')
        .replace(/^\uFEFF/, '')
        .replace(/\u00a0/g, ' ')
        .replace(/\n/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
    }

    function normalizeText(value) {
      return String(value ?? '')
        .replace(/^\uFEFF/, '')
        .replace(/\u00a0/g, ' ')
        .replace(/\n/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function normalizeLanguage(value) {
      let language = normalizeText(value).toUpperCase();
      if (language === 'TELEGU') language = 'TELUGU';
      return language;
    }

    function normalizeMms(value) {
      return String(value ?? '')
        .replace(/^\uFEFF/, '')
        .replace(/\.0$/, '')
        .trim();
    }

    function normalizeCode(value) {
      return String(value ?? '')
        .replace(/^\uFEFF/, '')
        .replace(/\u00a0/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .toUpperCase();
    }

    function toShortCode(value) {
      const code = normalizeCode(value);
      return code ? code.slice(0, 8) : '';
    }

    function normalizeNumber(value) {
      if (value === null || value === undefined || value === '') return 0;
      if (typeof value === 'number' && Number.isFinite(value)) return value;

      const cleaned = String(value)
        .replace(/,/g, '')
        .replace(/[^0-9.\-]/g, '')
        .trim();

      if (cleaned === '' || cleaned === '-' || cleaned === '.') return 0;

      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function compareMixed(a, b) {
      const aNum = Number(a);
      const bNum = Number(b);
      const aNumOk = !Number.isNaN(aNum) && String(a).trim() !== '';
      const bNumOk = !Number.isNaN(bNum) && String(b).trim() !== '';

      if (aNumOk && bNumOk) return aNum - bNum;
      return String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' });
    }

    function findColumn(obj, candidates) {
      const keys = Object.keys(obj || {});
      const map = new Map(keys.map(k => [normalizeKey(k), k]));
      for (const candidate of candidates) {
        const found = map.get(normalizeKey(candidate));
        if (found) return found;
      }
      return null;
    }

    async function readWorkbook(file) {
      const fileName = (file.name || '').toLowerCase();

      if (fileName.endsWith('.csv')) {
        const text = await file.text();
        return XLSX.read(text, { type: 'string' });
      }

      const buffer = await file.arrayBuffer();
      return XLSX.read(buffer, { type: 'array' });
    }

    function getSheetMatrix(sheet) {
      return XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
    }

    function rowsFromHeaderIndex(matrix, headerIndex) {
      const headerRow = matrix[headerIndex] || [];
      const dataRows = matrix.slice(headerIndex + 1);

      return dataRows
        .filter(row => row.some(cell => String(cell).trim() !== ''))
        .map(row => {
          const obj = {};
          headerRow.forEach((h, idx) => {
            const key = String(h ?? '').trim();
            obj[key] = row[idx] ?? '';
          });
          return obj;
        });
    }

    function detectHeaderRow(matrix, requiredCandidatesList, maxScanRows = 12) {
      const scanLimit = Math.min(matrix.length, maxScanRows);

      for (let i = 0; i < scanLimit; i++) {
        const row = matrix[i] || [];
        const normalized = row.map(cell => normalizeKey(cell));
        const rowSet = new Set(normalized);

        const matchesAll = requiredCandidatesList.every(candidateGroup =>
          candidateGroup.some(candidate => rowSet.has(normalizeKey(candidate)))
        );

        if (matchesAll) return i;
      }

      return -1;
    }

    function getMasterRows(sheet) {
      const matrix = getSheetMatrix(sheet);
      const headerIndex = detectHeaderRow(matrix, [
        ['Language'],
        ['MMS Code', 'MMS CODE'],
        ['Book Name', 'TITLE', 'Title']
      ], 20);

      if (headerIndex === -1) {
        throw new Error('Could not detect header row in Books Master file.');
      }

      return rowsFromHeaderIndex(matrix, headerIndex);
    }

    function getSosrcRows(sheet) {
      const matrix = getSheetMatrix(sheet);
      const headerIndex = detectHeaderRow(matrix, [
        ['Short Code', 'SHORT CODE', 'Code', 'CODE'],
        ['Book Name', 'BOOK NAME', 'Title', 'TITLE']
      ], 20);

      if (headerIndex === -1) {
        throw new Error('Could not detect header row in SOSRC file.');
      }

      return rowsFromHeaderIndex(matrix, headerIndex);
    }

    function getPreviousIndentRows(sheet) {
      const matrix = getSheetMatrix(sheet);
      const headerIndex = detectHeaderRow(matrix, [
        ['CODE', 'Code'],
        ['MMS CODE', 'MMS Code', 'MMSCODE'],
        ['TITLE', 'Title']
      ], 30);

      if (headerIndex === -1) {
        throw new Error('Could not detect header row in Previous Indent Books sheet.');
      }

      return rowsFromHeaderIndex(matrix, headerIndex);
    }

    function getHeaderedStockRows(sheet) {
      const raw = getSheetMatrix(sheet);
      const headerRow = raw[2] || [];
      const dataRows = raw.slice(3);

      return dataRows
        .filter(row => row.some(cell => String(cell).trim() !== ''))
        .map(row => {
          const obj = {};
          headerRow.forEach((h, idx) => {
            obj[String(h).trim()] = row[idx] ?? '';
          });
          obj.__row = row;
          return obj;
        });
    }

    function currency(value) {
      return Number(value || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function buildGroupedRows(rows) {
      const out = [];
      let shown = 0;

      for (const lang of langOrder) {
        const group = rows.filter(r => r.language === lang);
        if (!group.length) continue;
        shown += 1;
        out.push({ type: 'group', label: `${lang} BOOKS` });
        out.push(...group.map(r => ({ type: 'book', ...r })));
      }

      state.languagesShown = shown;
      return out;
    }

    function formatRemarkText(remarks) {
      const parts = String(remarks || '')
        .split(',')
        .map(x => x.trim())
        .filter(Boolean);

      return parts.join(', ');
    }

    function populateLanguageFilter(rows) {
      const langs = [...new Set(rows.map(r => r.language).filter(Boolean))]
        .sort((a, b) => {
          const ai = langOrder.indexOf(a);
          const bi = langOrder.indexOf(b);
          if (ai === -1 && bi === -1) return a.localeCompare(b);
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });

      els.languageFilter.innerHTML = `
        <option value="ALL">All languages</option>
        ${langs.map(lang => `<option value="${escapeHtml(lang)}">${escapeHtml(lang)}</option>`).join('')}
      `;
    }

    function sortRows(rows) {
      const sorted = [...rows];
      const mode = els.sortFilter.value;

      sorted.sort((a, b) => {
        switch (mode) {
          case 'TITLE_ASC':
            return a.title.localeCompare(b.title, undefined, { sensitivity: 'base' });
          case 'TITLE_DESC':
            return b.title.localeCompare(a.title, undefined, { sensitivity: 'base' });
          case 'MMS_ASC':
            return compareMixed(a.mmsCode, b.mmsCode);
          case 'MMS_DESC':
            return compareMixed(b.mmsCode, a.mmsCode);
          case 'CODE_ASC':
            return a.code.localeCompare(b.code, undefined, { sensitivity: 'base', numeric: true });
          case 'CODE_DESC':
            return b.code.localeCompare(a.code, undefined, { sensitivity: 'base', numeric: true });
          case 'SALE_ASC':
            return a.salePrice - b.salePrice;
          case 'SALE_DESC':
            return b.salePrice - a.salePrice;
          case 'COST_ASC':
            return a.costPrice - b.costPrice;
          case 'COST_DESC':
            return b.costPrice - a.costPrice;
          case 'LANG_TITLE_ASC':
          default: {
            const ai = langOrder.indexOf(a.language);
            const bi = langOrder.indexOf(b.language);
            const safeAi = ai === -1 ? 999 : ai;
            const safeBi = bi === -1 ? 999 : bi;
            const langCmp = safeAi - safeBi;
            if (langCmp !== 0) return langCmp;
            return a.title.localeCompare(b.title, undefined, { sensitivity: 'base' });
          }
        }
      });

      return sorted;
    }

    function applyFilters() {
      const searchTerm = normalizeKey(els.searchInput.value);
      const languageValue = els.languageFilter.value;
      const remarksValue = els.remarksFilter.value;

      let filtered = state.rows.filter(row => {
        const matchesSearch = !searchTerm || [
          row.title,
          row.mmsCode,
          row.code,
          row.remarks
        ].some(v => normalizeKey(v).includes(searchTerm));

        const matchesLanguage = languageValue === 'ALL' || row.language === languageValue;

        let matchesRemark = true;
        if (remarksValue === 'NO_REMARKS') {
          matchesRemark = !String(row.remarks || '').trim();
        } else if (remarksValue !== 'ALL') {
          matchesRemark = String(row.remarks || '')
            .split(',')
            .map(x => x.trim())
            .includes(remarksValue);
        }

        return matchesSearch && matchesLanguage && matchesRemark;
      });

      filtered = sortRows(filtered);

      state.filteredRows = filtered;
      state.groupedRows = buildGroupedRows(filtered);

      updateVisibleStats();
      renderTable();
    }

    function updateVisibleStats() {
      const shownBooks = state.filteredRows.length;
      const shownMatchedStock = state.filteredRows.filter(r => r.hasStock).length;
      const shownSosrc = state.filteredRows.filter(r =>
        String(r.remarks || '').split(',').map(x => x.trim()).includes('SOSRC')
      ).length;
      const shownLanguages = new Set(state.filteredRows.map(r => r.language)).size;

      els.booksCount.textContent = String(shownBooks);
      els.matchCount.textContent = String(shownMatchedStock);
      els.sosrcCount.textContent = String(shownSosrc);
      els.langCount.textContent = String(shownLanguages);
      els.exceptionCount.textContent = String(state.exceptionRows.length);
    }

    function renderTable() {

      table.style.display = 'table';

      table.innerHTML = `
        <colgroup>

          <col class="mms-col">
          <col class="title-col">
          <col class="qty-col">
          <col class="sale-col">
          <col class="cost-col">
          <col class="saleamt-col">
          <col class="costamt-col">
          <col class="remarks-col">
        </colgroup>
        <thead>
          <tr>

          <tr>

            <th>MMS CODE</th>
            <th style="text-align:left;">TITLE</th>

                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                  <td></td>
                </tr>
              `;
            }

            const saleAmount = (Number(row.qty) || 0) * row.salePrice;
            const costAmount = (Number(row.qty) || 0) * row.costPrice;

              <tr class="${rowClasses}" data-row-id="${escapeHtml(row.id)}">

      table.querySelectorAll('[data-qty-input]').forEach(input => {

          const costCell = table.querySelector(`[data-cost-amount="${CSS.escape(id)}"]`);

        });
      });
    }

    function addCellStyle(cell, fillArgb, bold = false, align = 'center', wrap = true) {
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fillArgb } };
      cell.font = { name: 'Arial', size: 10, bold, color: { argb: 'FF111111' } };
      cell.alignment = { vertical: 'middle', horizontal: align, wrapText: wrap };
      cell.border = {
        top: { style: 'thin', color: { argb: 'FF111111' } },
        left: { style: 'thin', color: { argb: 'FF111111' } },
        bottom: { style: 'thin', color: { argb: 'FF111111' } },
        right: { style: 'thin', color: { argb: 'FF111111' } }
      };
    }

    async function buildWorkbookBlob() {
      const workbook = new ExcelJS.Workbook();

      const ws = workbook.addWorksheet('BOOKS');
      ws.columns = [
        { key: 'code', width: 16.5 },
        { key: 'mmsCode', width: 9.6 },
        { key: 'title', width: 46.5 },
        { key: 'qty', width: 9.6 },
        { key: 'salePrice', width: 10.7 },
        { key: 'costPrice', width: 10.3 },
        { key: 'saleAmount', width: 11.8 },
        { key: 'costAmount', width: 13.5 },
        { key: 'remarks', width: 20 }
      ];

      ws.mergeCells('A1:D1');
      ws.mergeCells('E1:I1');
      ws.getCell('A1').value = 'Centre';
      ws.getCell('E1').value = 'Date';
      addCellStyle(ws.getCell('A1'), 'FFD8FFFF', false, 'left');
      addCellStyle(ws.getCell('E1'), 'FFD8FFFF', false, 'center');
      ws.getRow(1).height = 24;

      const headers = ['CODE', 'MMS CODE', 'TITLE', 'Qty.', 'SALE PRICE', 'COST PRICE', 'Sale Amount', 'Cost Amount', 'Remarks'];
      headers.forEach((header, index) => {
        const cell = ws.getCell(2, index + 1);
        cell.value = header;
        addCellStyle(cell, 'FFD8FFFF', true, index === 2 ? 'left' : 'center');
      });
      ws.getRow(2).height = 40;

      let rowNum = 3;
      const fullGroupedRows = buildGroupedRows(sortRows(state.rows));

      for (const item of fullGroupedRows) {
        if (item.type === 'group') {
          for (let col = 1; col <= 9; col++) {
            const cell = ws.getCell(rowNum, col);
            cell.value = col === 3 ? item.label : '';
            addCellStyle(cell, 'FF00008B', true, col === 3 ? 'left' : 'center');
            cell.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
          }
          ws.getRow(rowNum).height = 20;
          rowNum += 1;
          continue;
        }

        const row = ws.getRow(rowNum);
        row.getCell(1).value = item.code;
        row.getCell(2).value = item.mmsCode;
        row.getCell(3).value = item.title;
        row.getCell(4).value = Number(item.qty) || null;
        row.getCell(5).value = item.salePrice;
        row.getCell(6).value = item.costPrice;
        row.getCell(7).value = { formula: `D${rowNum}*E${rowNum}` };
        row.getCell(8).value = { formula: `D${rowNum}*F${rowNum}` };
        row.getCell(9).value = item.remarks || '';

        let fillArgb = 'FFD8FFFF';
        if (item.isSosrc) fillArgb = 'FFF8D7DA';
        else if (item.isDlLow) fillArgb = 'FFBFC3C9';

        row.eachCell({ includeEmpty: true }, cell => {
          const isQtyCell = cell.col === 4;
          addCellStyle(cell, isQtyCell ? 'FFFFFFFF' : fillArgb, false, cell.col === 3 ? 'left' : 'center', true);
          if (cell.col === 3 || cell.col === 9) {
            cell.alignment = { vertical: 'top', horizontal: 'left', wrapText: true };
          }
        });

        [5, 6, 7, 8].forEach(i => row.getCell(i).numFmt = '#,##0.00');
        row.getCell(4).numFmt = '0';
        row.getCell(4).alignment = { vertical: 'middle', horizontal: 'center' };

        rowNum += 1;
      }

      ws.views = [{ state: 'frozen', ySplit: 2 }];

      const ex = workbook.addWorksheet('Exception List');
      ex.columns = [
        { key: 'code', width: 16.5 },
        { key: 'mmsCode', width: 9.6 },
        { key: 'title', width: 46.5 },
        { key: 'qty', width: 9.6 },
        { key: 'salePrice', width: 10.7 },
        { key: 'costPrice', width: 10.3 },
        { key: 'saleAmount', width: 11.8 },
        { key: 'costAmount', width: 13.5 },
        { key: 'remarks', width: 20 }
      ];

      const exHeaders = ['CODE', 'MMS CODE', 'TITLE', 'Qty.', 'SALE PRICE', 'COST PRICE', 'Sale Amount', 'Cost Amount', 'Remarks'];
      exHeaders.forEach((header, index) => {
        const cell = ex.getCell(1, index + 1);
        cell.value = header;
        addCellStyle(cell, 'FFD8FFFF', true, index === 2 ? 'left' : 'center');
      });

      let exRowNum = 2;
      const groupedExceptionRows = buildGroupedRows(sortRows(state.exceptionRows));

      for (const item of groupedExceptionRows) {
        if (item.type === 'group') {
          for (let col = 1; col <= 9; col++) {
            const cell = ex.getCell(exRowNum, col);
            cell.value = col === 3 ? item.label : '';
            addCellStyle(cell, 'FF00008B', true, col === 3 ? 'left' : 'center');
            cell.font = { name: 'Arial', size: 10, bold: true, color: { argb: 'FFFFFFFF' } };
          }
          ex.getRow(exRowNum).height = 20;
          exRowNum += 1;
          continue;
        }

        const row = ex.getRow(exRowNum);
        row.getCell(1).value = item.code;
        row.getCell(2).value = item.mmsCode;
        row.getCell(3).value = item.title;
        row.getCell(4).value = Number(item.qty) || null;
        row.getCell(5).value = item.salePrice;
        row.getCell(6).value = item.costPrice;
        row.getCell(7).value = { formula: `D${exRowNum}*E${exRowNum}` };
        row.getCell(8).value = { formula: `D${exRowNum}*F${exRowNum}` };
        row.getCell(9).value = item.remarks || '';

        let fillArgb = 'FFD8FFFF';
        if (item.isSosrc) fillArgb = 'FFF8D7DA';
        else if (item.isDlLow) fillArgb = 'FFBFC3C9';

        row.eachCell({ includeEmpty: true }, cell => {
          const isQtyCell = cell.col === 4;
          addCellStyle(cell, isQtyCell ? 'FFFFFFFF' : fillArgb, false, cell.col === 3 ? 'left' : 'center', true);
          if (cell.col === 3 || cell.col === 9) {
            cell.alignment = { vertical: 'top', horizontal: 'left', wrapText: true };
          }
        });

        [5, 6, 7, 8].forEach(i => row.getCell(i).numFmt = '#,##0.00');
        row.getCell(4).numFmt = '0';
        row.getCell(4).alignment = { vertical: 'middle', horizontal: 'center' };

        exRowNum += 1;
      }

      ex.views = [{ state: 'frozen', ySplit: 1 }];

      const buffer = await workbook.xlsx.writeBuffer();
      return new Blob([buffer], {
        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
      });
    }

    async function processFiles() {
      const masterFile = els.masterFile.files[0];
      const stockFile = els.stockFile.files[0];
      const sosrcFile = els.sosrcFile.files[0];
      const previousIndentFile = els.previousIndentFile.files[0];

      if (!masterFile || !stockFile || !sosrcFile || !previousIndentFile) {
        throw new Error('Please upload all four files first.');
      }

      setStatus('Reading files');
      log('Reading uploaded files...');

      const [masterWb, stockWb, sosrcWb, previousIndentWb] = await Promise.all([
        readWorkbook(masterFile),
        readWorkbook(stockFile),
        readWorkbook(sosrcFile),
        readWorkbook(previousIndentFile)
      ]);

      const masterSheet = masterWb.Sheets[masterWb.SheetNames[0]];
      const stockSheet = stockWb.Sheets[stockWb.SheetNames[0]];
      const sosrcSheet = sosrcWb.Sheets[sosrcWb.SheetNames[0]];

      const masterRowsRaw = getMasterRows(masterSheet);
      const stockRowsRaw = getHeaderedStockRows(stockSheet);
      const sosrcRowsRaw = getSosrcRows(sosrcSheet);

      const previousIndentSheetName =
        previousIndentWb.SheetNames.find(name => normalizeKey(name) === 'BOOKS') ||
        previousIndentWb.SheetNames.find(name => normalizeKey(name).includes('BOOK'));

      if (!previousIndentSheetName) {
        throw new Error('Could not find Books sheet in Previous Indent file.');
      }

      log(`Previous indent sheet used: ${previousIndentSheetName}`);
      const previousIndentSheet = previousIndentWb.Sheets[previousIndentSheetName];
      const previousIndentRowsRaw = getPreviousIndentRows(previousIndentSheet);

      if (!masterRowsRaw.length) throw new Error('Books Master file appears empty.');
      if (!stockRowsRaw.length) throw new Error('Stock Position file appears empty after row 3 header parsing.');
      if (!sosrcRowsRaw.length) throw new Error('SOSRC file appears empty.');
      if (!previousIndentRowsRaw.length) throw new Error('Previous Indent file appears empty.');

      log(`Master rows loaded: ${masterRowsRaw.length}`);
      log(`Stock rows loaded: ${stockRowsRaw.length}`);
      log(`SOSRC rows loaded: ${sosrcRowsRaw.length}`);
      log(`Previous indent rows loaded: ${previousIndentRowsRaw.length}`);

      const masterFirst = masterRowsRaw[0];
      const stockFirst = stockRowsRaw[0];
      const sosrcFirst = sosrcRowsRaw[0];
      const previousFirst = previousIndentRowsRaw[0];

      const masterCols = {
        language: findColumn(masterFirst, ['Language']),
        langCat: findColumn(masterFirst, ['Laguage Category', 'Language Category']),
        mms: findColumn(masterFirst, ['MMS Code', 'MMS CODE']),
        bookName: findColumn(masterFirst, ['Book Name', 'TITLE', 'Title']),
        shortCode: findColumn(masterFirst, ['Short Code', 'SHORT CODE']),
        bavCode: findColumn(masterFirst, ['BAV Code', 'BAV CODE', 'Code', 'CODE']),
        salePrice: findColumn(masterFirst, ['Sale Price(Rs.)', 'SALE PRICE', 'Sale Price']),
        costPrice: findColumn(masterFirst, ['Cost Price(Rs.)', 'COST PRICE', 'COST  PRICE', 'Cost Price'])
      };

      const missingMaster = Object.entries(masterCols)
        .filter(([, value]) => !value)
        .map(([key]) => key);

      if (missingMaster.length) {
        log(`Master headers found: ${Object.keys(masterFirst).join(' | ')}`, 'error');
        throw new Error(`Master file is missing expected columns: ${missingMaster.join(', ')}`);
      }

      const stockMmsCol = findColumn(stockFirst, ['MMS Code', 'MMS CODE']);
      if (!stockMmsCol) {
        throw new Error('Stock file MMS Code column not found.');
      }

      const sosrcCols = {
        shortCode: findColumn(sosrcFirst, ['Short Code', 'SHORT CODE', 'Code', 'CODE']),
        bookName: findColumn(sosrcFirst, ['Book Name', 'BOOK NAME', 'Title', 'TITLE'])
      };

      const missingSosrc = Object.entries(sosrcCols)
        .filter(([, value]) => !value)
        .map(([key]) => key);

      if (missingSosrc.length) {
        log(`SOSRC headers found: ${Object.keys(sosrcFirst).join(' | ')}`, 'error');
        throw new Error(`SOSRC file is missing expected columns: ${missingSosrc.join(', ')}`);
      }

      const previousCodeCol = findColumn(previousFirst, ['CODE', 'Code']);
      if (!previousCodeCol) {
        throw new Error('Previous Indent Books sheet CODE column not found.');
      }

      const totalStockMap = new Map();
      const vStockMap = new Map();

      for (const row of stockRowsRaw) {
        const mms = normalizeMms(row[stockMmsCol]);
        if (!mms || /#REF!/i.test(mms)) continue;

        const arr = row.__row || [];
        const v = normalizeNumber(arr[21]);
        const am = normalizeNumber(arr[38]);

        totalStockMap.set(mms, v + am);
        vStockMap.set(mms, v);
      }

      const sosrcShortCodeSet = new Set();
      for (const row of sosrcRowsRaw) {
        const shortCode = normalizeCode(row[sosrcCols.shortCode]);
        if (!shortCode) continue;
        sosrcShortCodeSet.add(shortCode);
      }

      const previousIndentShortCodeSet = new Set();
      for (const row of previousIndentRowsRaw) {
        const prevFullCode = row[previousCodeCol];
        const prevShortCode = toShortCode(prevFullCode);
        if (!prevShortCode) continue;
        previousIndentShortCodeSet.add(prevShortCode);
      }

      log(`SOSRC short codes available: ${sosrcShortCodeSet.size}`);
      log(`Previous indent short codes available: ${previousIndentShortCodeSet.size}`);

      let matchedStock = 0;
      let sosrcCount = 0;

      const processed = masterRowsRaw
        .map((row, idx) => {
          const language = normalizeLanguage(row[masterCols.language]);
          if (!validLangs.includes(language)) return null;

          const langCat = normalizeText(row[masterCols.langCat]).toUpperCase();
          const mmsCode = normalizeMms(row[masterCols.mms]);
          const title = normalizeText(row[masterCols.bookName]);
          const bavCode = normalizeText(row[masterCols.bavCode]);
          const bavCodeKey = normalizeCode(row[masterCols.bavCode]);
          const shortCodeFromFile = normalizeCode(row[masterCols.shortCode]);
          const shortCodeKey = shortCodeFromFile || toShortCode(bavCodeKey);
          const salePrice = normalizeNumber(row[masterCols.salePrice]);
          const costPrice = normalizeNumber(row[masterCols.costPrice]);

          const hasStock = totalStockMap.has(mmsCode);
          if (hasStock) matchedStock += 1;

          const totalStock = totalStockMap.get(mmsCode) || 0;
          const vStock = vStockMap.get(mmsCode) || 0;

          const isSosrc = sosrcShortCodeSet.has(shortCodeKey);
          if (isSosrc) sosrcCount += 1;

          let allIndiaLow = false;
          let dlLow = false;

          if (hasStock) {
            if (langCat === 'REGIONAL') {
              allIndiaLow = totalStock < 10;
            } else {
              allIndiaLow = totalStock < 30;
            }
            dlLow = vStock < 30;
          }

          const remarks = [];
          if (allIndiaLow) {
            remarks.push('All India low stock');
          } else if (dlLow) {
            remarks.push('DL low stock');
          }
          if (isSosrc) remarks.push('SOSRC');

          return {
            id: `${mmsCode || 'row'}-${idx}`,
            language,
            code: bavCode,
            shortCode: shortCodeKey,
            mmsCode,
            title,
            qty: 0,
            salePrice,
            costPrice,
            remarks: remarks.join(', '),
            hasStock,
            isSosrc,
            isDlLow: !allIndiaLow && dlLow,
            isIndiaLow: allIndiaLow
          };
        })
        .filter(Boolean);

      state.rows = processed;

      state.exceptionRows = processed.filter(row =>
        row.shortCode && !previousIndentShortCodeSet.has(row.shortCode)
      );

      state.filteredRows = [...processed];
      populateLanguageFilter(processed);
      applyFilters();
      state.matchedStock = matchedStock;
      state.sosrcCount = sosrcCount;
      state.workbookBlob = await buildWorkbookBlob();

      setStatus('Preview ready');
      log(`Processed ${processed.length} books.`);
      log(`Matched stock rows: ${matchedStock}. SOSRC matches by short code: ${sosrcCount}.`);
      log(`Exception rows found by short code: ${state.exceptionRows.length}.`);
      els.downloadBtn.disabled = false;
    }

    els.buildBtn.addEventListener('click', async () => {
      try {
        els.buildBtn.disabled = true;
        els.downloadBtn.disabled = true;
        setStatus('Processing');
        log('Starting build...');
        await processFiles();
      } catch (error) {
        console.error(error);
        setStatus('Error');
        log(error.message || 'Something went wrong.', 'error');
        alert(error.message || 'Something went wrong. Check the log.');
      } finally {
        els.buildBtn.disabled = false;
      }
    });

    els.downloadBtn.addEventListener('click', async () => {
      try {
        setStatus('Preparing download');
        state.workbookBlob = await buildWorkbookBlob();
        saveAs(state.workbookBlob, 'MMS_Indent_Output.xlsx');
        setStatus('Download complete');
        log('Excel file downloaded with BOOKS and Exception List sheets.');
      } catch (error) {
        console.error(error);
        setStatus('Error');
        log(error.message || 'Could not generate Excel download.', 'error');
        alert(error.message || 'Could not generate Excel download.');
      }
    });

    els.searchInput.addEventListener('input', applyFilters);
    els.languageFilter.addEventListener('change', applyFilters);
    els.remarksFilter.addEventListener('change', applyFilters);
    els.sortFilter.addEventListener('change', applyFilters);

    els.clearFiltersBtn.addEventListener('click', () => {
      els.searchInput.value = '';
      els.languageFilter.value = 'ALL';
      els.remarksFilter.value = 'ALL';
      els.sortFilter.value = 'LANG_TITLE_ASC';
      applyFilters();
    });

    els.resetBtn.addEventListener('click', () => {
      els.masterFile.value = '';
      els.stockFile.value = '';
      els.sosrcFile.value = '';
      els.previousIndentFile.value = '';
      els.searchInput.value = '';
      els.languageFilter.innerHTML = '<option value="ALL">All languages</option>';
      els.remarksFilter.value = 'ALL';
      els.sortFilter.value = 'LANG_TITLE_ASC';

      state.rows = [];
      state.filteredRows = [];
      state.groupedRows = [];
      state.workbookBlob = null;
      state.matchedStock = 0;
      state.sosrcCount = 0;
      state.languagesShown = 0;
      state.exceptionRows = [];

      els.booksCount.textContent = '0';
      els.matchCount.textContent = '0';
      els.sosrcCount.textContent = '0';
      els.langCount.textContent = '0';
      els.exceptionCount.textContent = '0';
      els.log.textContent = 'Ready.';
      els.previewTable.style.display = 'none';
      els.previewTable.innerHTML = '';
      els.emptyState.style.display = 'grid';
      els.downloadBtn.disabled = true;
      setStatus('Waiting for files');
    });
  </script>
</body>
</html>
